image: python:3.12-slim

stages:
  - lint
  - format
  - type_check
  - test
  - coverage
  - dead-code
  - security

variables:
  DOC_SAGE_DB_PATH: /tmp/doc_sage_test.sqlite

before_script:
  - pip install --upgrade pip
  - pip install -r requirements-ci.txt

ruff-lint:
  stage: lint
  script:
    - ruff check .

ruff-format:
  stage: format
  script:
    - ruff format --check .

mypy:
  stage: type_check
  script:
    - mypy .

pytest:
  stage: test
  script:
    - pytest

coverage:
  stage: coverage
  script:
    - pytest --cov=. --cov-report=term-missing

vulture:
  stage: dead-code
  script:
    - vulture . --min-confidence 80

bandit:
  stage: security
  script:
    - bandit -r . --skip B101