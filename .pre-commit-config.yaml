repos: 
  - repo: local
    hooks:
      - id: ruff
        name: ruff formatter
        entry: ruff format
        stages: [pre-commit]
        language: system
        types: [python]
      - id: ruff
        name: ruff linter
        entry: ruff check --fix
        stages: [pre-commit]
        language: system
        types: [python]

